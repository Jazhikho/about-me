name: Sync Public Feeds

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync itch devlogs
        run: python scripts/sync_itch_devlogs.py

      - name: Sync Patreon posts
        env:
          PATREON_CREATOR_ACCESS_TOKEN: ${{ secrets.PATREON_CREATOR_ACCESS_TOKEN }}
        run: python scripts/sync_patreon_posts.py

      - name: Commit and push updates
        run: |
          if git diff --quiet -- content/itch-devlog.json content/patreon-posts.json; then
            echo "No feed changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/itch-devlog.json content/patreon-posts.json
          git commit -m "chore: sync public feeds"
          git push
